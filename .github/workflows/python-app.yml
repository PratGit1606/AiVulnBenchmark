name: Thesis benchmark

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv aiohttp bandit semgrep playwright
          python -m playwright install --with-deps chromium

      - name: Show Docker version
        run: docker version

      - name: Run benchmark for APP01
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python3 run_benchmark.py --app-id APP01 --port 8081

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            scans/
            triage/
            attacks/results/
            analysis/benchmark_results.csv
            logs/
            artifacts/
          if-no-files-found: ignore
